<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataCore Analytics Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 95vh;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
            display: inline-block;
        }
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            background: #fafafa;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 16px;
            padding: 10px;
        }
        .message {
            margin-bottom: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            background: #667eea;
            color: white;
            margin-left: auto;
        }
        .message.assistant {
            background: white;
            border: 1px solid #e0e0e0;
            color: #333;
            margin-right: auto;
        }
        .message .sources {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #666;
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            margin-right: 6px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge.pdf {
            background: #fff3e0;
            color: #e65100;
        }
        .badge.sql {
            background: #e3f2fd;
            color: #0d47a1;
        }
        .badge.ai {
            background: #f3e5f5;
            color: #6a1b9a;
        }
        .chat-input {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        .chat-input input:focus {
            border-color: #667eea;
        }
        .chat-input button {
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .chat-input button:hover {
            transform: scale(1.02);
        }
        .chat-input button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .side-panel {
            width: 380px;
            padding: 20px;
            background: #f8f9fa;
            border-left: 1px solid #e0e0e0;
            overflow-y: auto;
        }
        .side-panel h3 {
            margin-bottom: 16px;
            color: #333;
            font-size: 16px;
        }
        .filter-group {
            margin-bottom: 16px;
        }
        .filter-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #555;
        }
        .filter-group select, .filter-group input {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
        }
        .filter-group select:focus, .filter-group input:focus {
            border-color: #667eea;
        }
        .chart-container {
            background: white;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-top: 12px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .typing {
            color: #999;
            font-size: 14px;
            padding: 8px 16px;
        }
        .example-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .example-btn {
            background: #e8eaf6;
            border: none;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            color: #333;
            transition: background 0.2s;
        }
        .example-btn:hover {
            background: #c5cae9;
        }
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            .side-panel {
                width: 100%;
                border-left: none;
                border-top: 1px solid #e0e0e0;
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>📊 DataCore Analytics</h1>
                <p>Internal Analytics Assistant</p>
            </div>
            <div class="status">
                <span class="status-dot"></span>
                <span style="font-size: 14px;">Online</span>
            </div>
        </header>

        <div class="main-content">
            <!-- Chat Section -->
            <div class="chat-section">
                <div class="chat-messages" id="chatMessages">
                    <div class="message assistant">
                        <strong>👋 Welcome to DataCore Analytics!</strong>
                        <p style="margin-top: 8px;">Ask me about movie performance, regional engagement, or genre trends:</p>
                        <div class="example-questions">
                            <button class="example-btn" onclick="askExample('Which titles performed best in Q1 2025?')">📈 Top titles</button>
                            <button class="example-btn" onclick="askExample('Why is Stellar Run trending?')">⭐ Stellar Run</button>
                            <button class="example-btn" onclick="askExample('Compare Dark Orbit vs Last Kingdom')">📊 Compare</button>
                            <button class="example-btn" onclick="askExample('Which city had strongest growth?')">🌍 Growth</button>
                        </div>
                        <div class="sources">
                            <span class="badge sql">💾 SQL Database</span>
                            <span class="badge pdf">📄 PDF Reports</span>
                        </div>
                    </div>
                </div>
                
                <div id="typingIndicator" class="typing" style="display: none;">
                    <span class="loading"></span> Thinking...
                </div>

                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="Type your question..." onkeypress="handleKeyPress(event)">
                    <button id="sendBtn" onclick="sendMessage()">Send</button>
                </div>
            </div>

            <!-- Side Panel -->
            <div class="side-panel">
                <h3>📈 Filters & Analytics</h3>
                
                <div class="filter-group">
                    <label for="genreFilter">Genre Filter</label>
                    <select id="genreFilter" onchange="updateChart()">
                        <option value="">All Genres</option>
                        <option value="Action">Action</option>
                        <option value="Drama">Drama</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Sci-Fi">Sci-Fi</option>
                        <option value="Thriller">Thriller</option>
                        <option value="Romance">Romance</option>
                        <option value="Adventure">Adventure</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="monthFilter">Month</label>
                    <input type="month" id="monthFilter" value="2025-01" onchange="updateChart()">
                </div>

                <button onclick="updateChart()" style="width:100%;padding:10px;background:#667eea;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600;margin-bottom:12px;">
                    🔄 Update Chart
                </button>

                <div class="chart-container">
                    <canvas id="genreChart"></canvas>
                </div>
                <p style="font-size:11px;color:#999;text-align:center;margin-top:8px;">Genre Performance by Views</p>
            </div>
        </div>
    </div>

    <script>
        let chartInstance = null;
        let sessionId = null;

        // Example questions
        function askExample(question) {
            document.getElementById('chatInput').value = question;
            sendMessage();
        }

        // Handle Enter key
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Send message to backend
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Disable input
            input.disabled = true;
            sendBtn.disabled = true;
            
            // Add user message
            addMessage(message, 'user');
            input.value = '';
            
            // Show typing indicator
            document.getElementById('typingIndicator').style.display = 'block';
            
            try {
                const response = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });
                
                const data = await response.json();
                
                // Save session ID
                if (data.session_id) {
                    sessionId = data.session_id;
                }
                
                // Hide typing indicator
                document.getElementById('typingIndicator').style.display = 'none';
                
                // Add assistant message with sources
                addMessage(data.answer, 'assistant', data.sources);
                
            } catch (error) {
                document.getElementById('typingIndicator').style.display = 'none';
                addMessage('Error: Could not connect to the server. Make sure the backend is running.', 'assistant');
                console.error('Error:', error);
            }
            
            // Enable input
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
        }

        // Add message to chat
        function addMessage(text, type, sources = null) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            
            // Format text with line breaks
            const formattedText = text.replace(/\n/g, '<br>');
            div.innerHTML = `<div>${formattedText}</div>`;
            
            // Add sources if available
            if (sources && sources.length > 0) {
                const sourceDiv = document.createElement('div');
                sourceDiv.className = 'sources';
                let sourceHtml = '📎 Sources: ';
                sources.forEach(s => {
                    let badgeClass = 'badge ai';
                    if (s.type === 'PDF' || s.source.includes('.pdf')) {
                        badgeClass = 'badge pdf';
                    } else if (s.type === 'SQL' || s.source.includes('SQL')) {
                        badgeClass = 'badge sql';
                    }
                    sourceHtml += `<span class="${badgeClass}">${s.source}</span>`;
                });
                sourceDiv.innerHTML = sourceHtml;
                div.appendChild(sourceDiv);
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // Update chart with genre data
        async function updateChart() {
            const genre = document.getElementById('genreFilter').value;
            const month = document.getElementById('monthFilter').value;
            
            try {
                let url = 'http://localhost:8000/data/movies';
                const params = new URLSearchParams();
                if (genre) params.append('genre', genre);
                if (month) params.append('year', month.split('-')[0]);
                
                if (params.toString()) {
                    url += '?' + params.toString();
                }
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (!data.data || data.data.length === 0) {
                    console.log('No data for chart');
                    return;
                }
                
                // Prepare chart data
                const labels = data.data.slice(0, 10).map(d => d.title);
                const values = data.data.slice(0, 10).map(d => d.total_views || 0);
                
                const ctx = document.getElementById('genreChart').getContext('2d');
                
                if (chartInstance) {
                    chartInstance.destroy();
                }
                
                chartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Total Views',
                            data: values,
                            backgroundColor: 'rgba(102, 126, 234, 0.7)',
                            borderColor: 'rgba(102, 126, 234, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                display: false
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true
                            },
                            x: {
                                ticks: {
                                    font: {
                                        size: 9
                                    }
                                }
                            }
                        }
                    }
                });
                
            } catch (error) {
                console.error('Error loading chart:', error);
            }
        }

        // Load chart on page load
        window.onload = function() {
            setTimeout(updateChart, 1000);
        };
    </script>
</body>
</html>
